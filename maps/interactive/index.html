<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>OneHealth Environmental Atlas - Uttarakhand</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

  <header>
    <span class="h-icon">🌏</span>
    <div>
      <div class="h-title">OneHealth Environmental Atlas - Uttarakhand</div>
      <div class="h-sub">Remote Sensing · Census 2011 · HMIS · Livestock 2024</div>
    </div>
    <span class="h-badge">Resourcesat-2 LISS-III &nbsp;&nbsp;( 2016 · 2022 · 2025 )</span>
  </header>

  <div class="layout">

    <div class="map-col">
      <div class="layer-bar">
        <button class="lbtn lbtn_v active" data-layer="NDVI">🌿 Vegetation</button>
        <button class="lbtn lbtn_w"        data-layer="NDWI">💧 Water</button>
        <button class="lbtn lbtn_b"        data-layer="NDBI">🏗 Built Up</button>
      </div>
      <div id="map"></div>
      <div id="mapLegend"></div>
    </div>

    <div class="info-col">
      <div class="info-scroll" id="panel">
        <div class="loading-state">
          <div class="ls-spinner"></div>
          <div class="ls-text">Loading data…</div>
        </div>
      </div>
    </div>

  </div>

  <script src="js/helpers.js"></script>
  <script src="js/data.js"></script>
  <script src="js/map.js"></script>
  <script src="js/panel.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
